
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商用出行 2026H1 问卷回收进展看板 - 蓝色科技风</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            background-color: #87ceeb;
            background-image:
                linear-gradient(135deg, rgba(255,255,255,0.65) 0%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0.62) 100%),
                url('像素_路边.png');
            background-position: center;
            background-size: cover;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
            padding: 40px 20px;
            color: #1a1a2e;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 80%, rgba(34,197,94,0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(59,130,246,0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 20px rgba(0,0,0,0.15);
            color: #1f2937;
            letter-spacing: 1px;
        }

        .header p {
            font-size: 1rem;
            color: #4b5563;
        }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .summary-card {
            background: linear-gradient(135deg,
                rgba(255,255,255,0.9) 0%,
                rgba(255,255,255,0.85) 50%,
                rgba(255,255,255,0.88) 100%);
            backdrop-filter: blur(20px) saturate(180%);
            border-radius: 24px;
            padding: 28px;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.1);
            box-shadow:
                0 8px 32px rgba(0,0,0,0.15),
                inset 0 1px 0 rgba(255,255,255,0.8);
            position: relative;
            overflow: hidden;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .summary-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 70%, rgba(59,130,246,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 70% 30%, rgba(16,185,129,0.06) 0%, transparent 40%);
            animation: liquidGlow 8s ease-in-out infinite;
        }

        @keyframes liquidGlow {
            0%, 100% { transform: translate(0, 0) rotate(0deg); opacity: 0.5; }
            33% { transform: translate(5%, 5%) rotate(5deg); opacity: 0.8; }
            66% { transform: translate(-3%, 3%) rotate(-3deg); opacity: 0.6; }
        }

        .summary-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow:
                0 20px 60px rgba(0,0,0,0.2),
                inset 0 1px 0 rgba(255,255,255,1);
        }

        .summary-card:hover::before {
            animation-duration: 4s;
        }

        .summary-card .label {
            color: #374151;
            font-size: 0.9rem;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .summary-card .value {
            font-size: 2.8rem;
            font-weight: bold;
            color: #111827;
        }

        .summary-card .subtext {
            color: #374151;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .summary-card.primary .value { color: #1d4ed8; }
        .summary-card.success .value { color: #047857; }
        .summary-card.warning .value { color: #b45309; }

        .timeline-section, .progress-section {
            background: linear-gradient(135deg,
                rgba(255,255,255,0.92) 0%,
                rgba(255,255,255,0.88) 50%,
                rgba(255,255,255,0.9) 100%);
            backdrop-filter: blur(25px) saturate(180%);
            border-radius: 28px;
            padding: 32px;
            border: 1px solid rgba(0,0,0,0.08);
            box-shadow:
                0 15px 50px rgba(0,0,0,0.15),
                inset 0 1px 0 rgba(255,255,255,0.9);
            position: relative;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.5rem;
            color: #1a1a2e;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .timeline-container {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .timeline-label {
            width: 120px;
            font-weight: 600;
            color: #1f2937;
        }

        .timeline-bars {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .timeline-bar-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .timeline-bar-label {
            font-size: 0.85rem;
            color: #4b5563;
            min-width: 80px;
        }

        .timeline-bar-container {
            flex: 1;
            height: 32px;
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            overflow: hidden;
        }

        .timeline-bar {
            height: 100%;
            border-radius: 16px;
            transition: width 1s ease-out;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
        }

        .timeline-bar.time {
            background: linear-gradient(90deg, #6366f1, #a78bfa);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
        }

        .timeline-bar.progress {
            background: linear-gradient(90deg, #10b981, #34d399);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.5);
        }

        .timeline-bar-text {
            color: #1f2937;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .timeline-status {
            text-align: center;
            padding: 20px;
            border-radius: 12px;
            margin-top: 15px;
        }

        .timeline-status.danger {
            background: rgba(220, 38, 38, 0.2);
            border: 1px solid rgba(220, 38, 38, 0.5);
        }

        .timeline-status.warning {
            background: rgba(245, 158, 11, 0.2);
            border: 1px solid rgba(245, 158, 11, 0.5);
        }

        .timeline-status.success {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(16, 185, 129, 0.5);
        }

        .timeline-status-icon {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }

        .timeline-status-text {
            font-weight: 600;
            color: #1f2937;
            font-size: 1.2rem;
        }

        .timeline-status-subtext {
            color: #4b5563;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .timeline-dates {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed rgba(100, 200, 255, 0.2);
        }

        .timeline-date {
            text-align: center;
            font-size: 0.85rem;
            color: #6b7280;
        }

        .timeline-date strong {
            display: block;
            color: #1f2937;
            font-size: 1.1rem;
        }

        .progress-item {
            margin-bottom: 25px;
        }

        .progress-item:last-child {
            margin-bottom: 0;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .team-name {
            font-weight: 600;
            color: #1f2937;
            font-size: 1.1rem;
        }

        .progress-stats {
            display: flex;
            gap: 20px;
            font-size: 0.9rem;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .stat-current { color: #2563eb; font-weight: 600; }
        .stat-target { color: #4b5563; }

        .progress-bar-container {
            height: 28px;
            background: rgba(0,0,0,0.3);
            border-radius: 14px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            border-radius: 14px;
            transition: width 1s ease-out;
            position: relative;
        }

        .progress-bar-label {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.85rem;
            font-weight: 700;
            color: #1f2937;
            white-space: nowrap;
        }

        .progress-bar.low {
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.4);
        }

        .progress-bar.medium {
            background: linear-gradient(90deg, #10b981, #34d399);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        .progress-bar.high {
            background: linear-gradient(90deg, #60a5fa, #818cf8);
            box-shadow: 0 0 15px rgba(96, 165, 250, 0.4);
        }

        .progress-bar.full {
            background: linear-gradient(90deg, #34d399, #059669);
            box-shadow: 0 0 15px rgba(52, 211, 153, 0.4);
        }

        .progress-text {
            display: none;
        }

        .rank-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 8px;
            font-weight: bold;
            margin-right: 12px;
            font-size: 0.85rem;
            color: #fff;
        }

        .rank-badge.gold {
            background: #f59e0b;
        }

        .rank-badge.silver {
            background: #6b7280;
        }

        .rank-badge.bronze {
            background: #b8865b;
        }

        .rank-badge.normal {
            background: rgba(59, 130, 246, 0.2);
            color: #1f2937;
        }

        .team-row {
            display: flex;
            align-items: center;
        }

        .progress-item.winner .progress-bar {
            box-shadow: 0 0 15px rgba(96, 165, 250, 0.4);
        }

        .footer-note {
            margin-top: 20px;
            text-align: center;
            padding: 15px;
        }

        .footer-note p {
            color: #4b5563;
            font-size: 0.9rem;
        }

        .analysis-section {
            background: linear-gradient(135deg,
                rgba(255,255,255,0.92) 0%,
                rgba(255,255,255,0.88) 50%,
                rgba(255,255,255,0.9) 100%);
            backdrop-filter: blur(25px) saturate(180%);
            border-radius: 28px;
            padding: 32px;
            border: 1px solid rgba(0,0,0,0.08);
            box-shadow: 0 15px 50px rgba(0,0,0,0.15);
            margin-bottom: 30px;
        }

        .radar-chart {
            width: 100%;
            max-width: 500px;
            margin: 0 auto 30px;
        }

        .satisfaction-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 25px;
        }

        .satisfaction-card {
            background: rgba(255,255,255,0.6);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid rgba(0,0,0,0.08);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .satisfaction-card:hover {
            transform: translateY(-4px);
        }

        .satisfaction-card-title {
            font-weight: 600;
            color: #1f2937;
            font-size: 0.85rem;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .satisfaction-score {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .satisfaction-score-bar {
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            margin-top: 6px;
            overflow: hidden;
        }

        .satisfaction-score-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 1s ease-out;
        }

        .satisfaction-meta {
            font-size: 0.75rem;
            color: #9ca3af;
            margin-top: 4px;
        }

        .issue-list {
            margin-top: 20px;
        }

        .issue-item {
            background: rgba(255,255,255,0.6);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid;
        }

        .issue-item.critical { border-left-color: #dc2626; }
        .issue-item.warning { border-left-color: #f59e0b; }
        .issue-item.info { border-left-color: #3b82f6; }

        .issue-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-right: 8px;
        }

        .issue-tag.critical { background: #fef2f2; color: #dc2626; }
        .issue-tag.warning { background: #fffbeb; color: #d97706; }
        .issue-tag.info { background: #eff6ff; color: #2563eb; }

        .issue-title {
            font-weight: 600;
            color: #1f2937;
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .issue-detail {
            color: #6b7280;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .issue-source {
            color: #9ca3af;
            font-size: 0.8rem;
            margin-top: 6px;
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 1.8rem; }
            .summary-cards { grid-template-columns: repeat(2, 1fr); }
            .progress-stats { font-size: 0.8rem; gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 商用出行 2026H1 问卷回收进展看板</h1>
            <p>每周更新各业务组问卷回收进度 —— 2026/4/29</p>
        </div>

        <div class="summary-cards">
            <div class="summary-card primary">
                <div class="label">总回收数量</div>
                <div class="value" id="totalCollected">0</div>
                <div class="subtext">当前已回收问卷数</div>
            </div>
            <div class="summary-card success">
                <div class="label">H1 总目标</div>
                <div class="value" id="totalTarget">0</div>
                <div class="subtext">2026 年上半年目标</div>
            </div>
            <div class="summary-card warning">
                <div class="label">整体完成率</div>
                <div class="value" id="completionRate">0%</div>
                <div class="subtext">距离目标还有<span id="remaining">0</span>份</div>
            </div>
        </div>

        <div class="timeline-section">
            <h2 class="section-title">⏰ 调研时间进度预警</h2>
            <div class="timeline-container">
                <div class="timeline-label">时间进度</div>
                <div class="timeline-bars">
                    <div class="timeline-bar-wrapper">
                        <span class="timeline-bar-label">时间流逝</span>
                        <div class="timeline-bar-container">
                            <div class="timeline-bar time" id="timeProgress" style="width: 0%;">
                                <span class="timeline-bar-text" id="timeProgressText">0%</span>
                            </div>
                        </div>
                    </div>
                    <div class="timeline-bar-wrapper">
                        <span class="timeline-bar-label">任务完成</span>
                        <div class="timeline-bar-container">
                            <div class="timeline-bar progress" id="taskProgress" style="width: 0%;">
                                <span class="timeline-bar-text" id="taskProgressText">0%</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="timeline-status" id="timelineStatus">
                <div class="timeline-status-icon" id="statusIcon"></div>
                <div class="timeline-status-text" id="statusText"></div>
                <div class="timeline-status-subtext" id="statusSubtext"></div>
            </div>
            <div class="timeline-dates">
                <div class="timeline-date">
                    <strong>4 月 15 日</strong>
                    调研开始
                </div>
                <div class="timeline-date">
                    <strong>4 月 29 日</strong>
                    当前日期
                </div>
                <div class="timeline-date">
                    <strong>5 月 31 日</strong>
                    调研截止
                </div>
            </div>
        </div>

        <div class="progress-section">
            <h2 class="section-title">📈 各业务组回收进度</h2>
            <div id="progressList"></div>
        </div>

        <div class="analysis-section">
            <h2 class="section-title">🔍 问卷初步分析（4份已回收）</h2>

            <div class="satisfaction-grid" id="satGrid"></div>

            <div class="issue-list">
                <h3 style="color:#1f2937;font-weight:600;margin-bottom:15px;font-size:1.1rem;">⚠️ 重点问题汇总</h3>
                <div id="issueList"></div>
            </div>
        </div>

        <div class="footer-note">
            <p>📝 备注：以上回收目标为预估值，最终目标将依据客户分级制度正式确定后进行调整。</p>
        </div>
    </div>

    <script>
        const data = [
            { team: '欧美一组', collected: 0, h1Target: 10 },
            { team: '欧美二组', collected: 3, h1Target: 15 },
            { team: '亚太一组', collected: 1, h1Target: 15 },
            { team: '亚太二组', collected: 0, h1Target: 15 },
            { team: '欧美三组', collected: 0, h1Target: 15 }
        ];

        const surveyStartDate = new Date('2026-04-15');
        const surveyEndDate = new Date('2026-05-31');
        const currentDate = new Date('2026-04-29');

        const totalDays = (surveyEndDate - surveyStartDate) / (1000 * 60 * 60 * 24);
        const elapsedDays = (currentDate - surveyStartDate) / (1000 * 60 * 60 * 24);
        const timeProgress = ((elapsedDays / totalDays) * 100).toFixed(1);

        const totalCollected = data.reduce((sum, item) => sum + item.collected, 0);
        const totalTarget = data.reduce((sum, item) => sum + item.h1Target, 0);
        const completionRate = ((totalCollected / totalTarget) * 100).toFixed(1);
        const remaining = totalTarget - totalCollected;

        document.getElementById('totalCollected').textContent = totalCollected;
        document.getElementById('totalTarget').textContent = totalTarget;
        document.getElementById('completionRate').textContent = completionRate + '%';
        document.getElementById('remaining').textContent = remaining;

        document.getElementById('timeProgress').style.width = timeProgress + '%';
        document.getElementById('timeProgressText').textContent = timeProgress + '%';
        document.getElementById('taskProgress').style.width = completionRate + '%';
        document.getElementById('taskProgressText').textContent = completionRate + '%';

        const rateNum = parseFloat(completionRate);
        const timeNum = parseFloat(timeProgress);
        const statusEl = document.getElementById('timelineStatus');
        const statusIcon = document.getElementById('statusIcon');
        const statusText = document.getElementById('statusText');
        const statusSubtext = document.getElementById('statusSubtext');

        if (rateNum >= timeNum * 0.8) {
            statusEl.className = 'timeline-status success';
            statusIcon.textContent = '✅';
            statusText.textContent = '进度正常';
            statusSubtext.textContent = `任务完成度 (${completionRate}%) 与时间进度 (${timeProgress}%) 匹配`;
        } else if (rateNum >= timeNum * 0.3) {
            statusEl.className = 'timeline-status warning';
            statusIcon.textContent = '⚠️';
            statusText.textContent = '进度偏慢';
            statusSubtext.textContent = `任务完成度 (${completionRate}%) 低于时间进度 (${timeProgress}%)，建议加快节奏`;
        } else {
            statusEl.className = 'timeline-status danger';
            statusIcon.textContent = '🚨';
            statusText.textContent = '进度严重滞后';
            statusSubtext.textContent = `时间已过 ${timeProgress}%，但任务仅完成 ${completionRate}%，需立即加大力度`;
        }

        const sortedData = [...data].sort((a, b) => {
            const rateA = a.collected / a.h1Target;
            const rateB = b.collected / b.h1Target;
            return rateB - rateA;
        });

        function getProgressClass(rate) {
            if (rate >= 100) return 'full';
            if (rate >= 50) return 'high';
            if (rate >= 20) return 'medium';
            return 'low';
        }

        function getRankBadge(rank) {
            if (rank === 1) return '<div class="rank-badge gold">1</div>';
            if (rank === 2) return '<div class="rank-badge silver">2</div>';
            if (rank === 3) return '<div class="rank-badge bronze">3</div>';
            return '<div class="rank-badge normal">' + rank + '</div>';
        }

        let progressHTML = '';
        sortedData.forEach((item, index) => {
            const rate = Math.round((item.collected / item.h1Target) * 100);
            const progressClass = getProgressClass(rate);

            progressHTML += `
                <div class="progress-item">
                    <div class="progress-header">
                        <div class="team-row">
                            ${getRankBadge(index + 1)}
                            <span class="team-name">${item.team}</span>
                        </div>
                        <div class="progress-stats">
                            <span class="stat stat-current">✓ ${item.collected}</span>
                            <span class="stat stat-target">/ ${item.h1Target}</span>
                        </div>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar ${progressClass}" style="width: ${rate}%;">
                            <span class="progress-bar-label">${rate}%</span>
                        </div>
                    </div>
                </div>
            `;
        });

        document.getElementById('progressList').innerHTML = progressHTML;

        // === 问卷数据分析 ===
        const scoreMap = { 'Very Satisfied': 5, 'Satisfied': 4, 'Neutral': 3, 'Dissatisfied': 2, 'Very Dissatisfied': 1, 'N/A': null };

        const surveys = [
            { packaging: 5, unboxing: 5, quality: 5, functions: 5, performance: 5, riding: 5, om: 5, firmware: 5, docs: 5, issue: 5, spare: 4 },
            { packaging: 3, unboxing: 4, quality: 2, functions: 4, performance: 4, riding: 4, om: 3, firmware: null, docs: 1, issue: 4, spare: null },
            { packaging: 3, unboxing: 4, quality: 3, functions: 4, performance: 3, riding: 4, om: 4, firmware: 4, docs: 3, issue: 4, spare: null },
            { packaging: 3, unboxing: 4, quality: 4, functions: 5, performance: 4, riding: 4, om: 3, firmware: 4, docs: 4, issue: 4, spare: 3 }
        ];

        const dimLabels = [
            { key: 'packaging', name: '包装体验', en: 'Packaging' },
            { key: 'unboxing', name: '开箱体验', en: 'Unboxing' },
            { key: 'quality', name: '产品质量', en: 'Quality' },
            { key: 'functions', name: '产品功能', en: 'Functions' },
            { key: 'performance', name: '产品性能', en: 'Performance' },
            { key: 'riding', name: '骑行体验', en: 'Riding' },
            { key: 'om', name: '运维体验', en: 'O&M' },
            { key: 'firmware', name: '固件定制', en: 'Firmware' },
            { key: 'docs', name: '技术文档', en: 'Docs' },
            { key: 'issue', name: '问题解决', en: 'Issue Res.' },
            { key: 'spare', name: '备件服务', en: 'Spare Parts' }
        ];

        function getScoreColor(avg) {
            if (avg >= 4.5) return '#059669';
            if (avg >= 3.5) return '#2563eb';
            if (avg >= 2.5) return '#d97706';
            if (avg >= 1.5) return '#dc2626';
            return '#991b1b';
        }

        let satHTML = '';
        dimLabels.forEach(d => {
            const scores = surveys.map(s => s[d.key]).filter(v => v !== null);
            const avg = scores.length > 0 ? (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1) : 'N/A';
            const avgNum = avg === 'N/A' ? 0 : parseFloat(avg);
            const pct = avg === 'N/A' ? 0 : (avgNum / 5) * 100;
            const color = getScoreColor(avgNum);
            const count = scores.length;

            satHTML += `<div class="satisfaction-card">
                <div class="satisfaction-card-title">${d.name}<br><span style="color:#9ca3af;font-size:0.75rem">${d.en}</span></div>
                <div class="satisfaction-score" style="color:${avg === 'N/A' ? '#9ca3af' : color}">${avg}</div>
                <div class="satisfaction-meta">${avg === 'N/A' ? '无有效评分' : `${count} 份有效 / 5分满分`}</div>
                <div class="satisfaction-score-bar"><div class="satisfaction-score-fill" style="width:${pct}%;background:${avg === 'N/A' ? '#e5e7eb' : color}"></div></div>
            </div>`;
        });
        document.getElementById('satGrid').innerHTML = satHTML;

        // 重点问题汇总
        const issues = [
            {
                level: 'critical',
                tag: '严重',
                title: '产品质量 - 前叉问题',
                detail: '前叉未正确紧固，导致重大生产失误，严重影响客户上线计划',
                source: '客户B (Dott/欧美二组)'
            },
            {
                level: 'critical',
                tag: '严重',
                title: '技术文档 - 交付不及时且实用性不足',
                detail: 'SOP、技术支持和工具等文档未按时交付；九号似乎没有标准化文档模板，客户每次都需要重复索要',
                source: '客户B (Dott/欧美二组)'
            },
            {
                level: 'warning',
                tag: '关注',
                title: '产品性能 - 续航与防水问题',
                detail: '新车型短骑行率高于旧车型；B200电池连接器出现腐蚀；初始耗电率偏高',
                source: '客户C (Dott/欧美二组)'
            },
            {
                level: 'warning',
                tag: '关注',
                title: '产品质量 - 结构耐久性',
                detail: 'Apex电池锁/盖易被打开导致电池被盗；B200自由轮问题；结构件异常响声、松动、变形',
                source: '客户C (Dott/欧美二组)'
            },
            {
                level: 'warning',
                tag: '关注',
                title: '运维体验 - 维护效率低',
                detail: '前叉和线缆拆装流程效率不足；ECU舱线缆管理不理想；日常维护效率、故障排查和备件更换均有提升空间',
                source: '客户B & D (Dott/欧美二组)'
            },
            {
                level: 'warning',
                tag: '关注',
                title: '备件服务 - 交付周期长',
                detail: '备件和工具交付周期较长；应确保备件与车辆同步到达市场，需提前规划备件发货',
                source: '客户D (Dott/欧美二组)'
            },
            {
                level: 'info',
                tag: '建议',
                title: '包装体验 - 包装材料过多',
                detail: '包装材料量大、占用仓库空间，需要多条分拣线处理，回收成本高',
                source: '客户B, C & D (Dott/欧美二组)'
            }
        ];

        let issueHTML = '';
        issues.forEach(i => {
            issueHTML += `<div class="issue-item ${i.level}">
                <span class="issue-tag ${i.level}">${i.tag}</span>
                <div class="issue-title">${i.title}</div>
                <div class="issue-detail">${i.detail}</div>
                <div class="issue-source">来源：${i.source}</div>
            </div>`;
        });
        document.getElementById('issueList').innerHTML = issueHTML;
    </script>
</body>
</html>
